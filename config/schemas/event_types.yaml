defaults:
  actor_allowed: ["*"]
  required_payload_fields: []
  allowed_payload_fields: ["*"]
  forbidden_payload_keys:
    - password
    - passwd
    - token
    - cookie
    - session
    - dsc
    - bank_details
    - raw_full_pdf_text
    - raw_html
    - supplier_table_dump
  citation_required: false
  private_data_allowed: false

events:
  system.snapshot_started: {object_type: system}
  system.snapshot_completed: {object_type: system}
  case.snapshot_imported: {object_type: case, citation_required: true}
  case.created: {object_type: case, citation_required: true, required_payload_fields: [status]}
  case.updated: {object_type: case, citation_required: true}
  case.status_changed: {object_type: case, required_payload_fields: [new_status]}
  case.workspace_created: {object_type: case_workspace, citation_required: true}
  case.updated_from_corrigendum: {object_type: case, citation_required: true, required_payload_fields: [corrigendum_hash]}
  approval.snapshot_imported: {object_type: approval, citation_required: true}
  approval.created: {object_type: approval, citation_required: true}
  approval.updated: {object_type: approval, citation_required: true}
