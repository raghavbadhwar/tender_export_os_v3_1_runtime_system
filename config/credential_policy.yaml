# credential_policy.yaml
# Tender Export OS credential handling policy
# Created after owner standing authorization on 2026-06-30.

purpose: >-
  Allow agents to log in to, sign up for, and maintain credentials/sessions for
  tender/export opportunity research portals and supplier outreach tools, while
  preventing credential leakage and preserving hard business approval gates.

standing_authorization:
  granted_by: owner
  granted_at: "2026-06-30"
  allowed_actions:
    - portal_login_for_research
    - portal_signup_for_research
    - portal_credential_creation
    - portal_session_refresh_for_research
    - supplier_outreach_account_setup
  scope:
    - opportunity discovery
    - public/private portal reading after legitimate account access
    - supplier quote/availability outreach
    - credential/session maintenance for the above
  not_in_scope:
    - paid subscriptions or paid portal upgrades
    - tender/RFQ submission
    - document upload to buyer/tender portals
    - buyer quotation/RFQ reply
    - DSC use
    - payment/EMD/security deposit/advance
    - supplier purchase order
    - final HSN/ITC-HS/origin/classification claims
    - final price, delivery, or payment-term commitments

secret_storage:
  approved_stores:
    - macOS Keychain
    - 1Password CLI if configured by owner
    - Hermes-approved encrypted secret store
  forbidden_stores:
    - CSV registers
    - YAML/JSON config files
    - Google Drive
    - HTML reports
    - event ledger payloads
    - agent prompts/transcripts
    - source code
  logging_rule: "Log only portal name, account alias, and secret alias; never log password, token, cookie, OTP, recovery code, or API key."
  alias_format: "tender-export-os/<portal_slug>/<account_role>"

runtime_rules:
  signup_identity: "Use real owner/business details already present in source-of-truth records; never fabricate certifications, IEC/GST/PAN/MSME status, memberships, address, bank details, or authority."
  otp_captcha: "If OTP, CAPTCHA, phone verification, or human identity challenge appears, pause that portal step and request live owner help."
  legal_terms: "Accept only standard free-account terms needed for read/research access; do not accept paid/commercial commitments or certification/legal attestations beyond known facts."
  paid_plans: "Require separate owner approval before any paid plan, paid tender aggregator, paid contact credits, or paid membership."
  evidence: "Create an internal receipt for every credential created/refreshed; cite portal URL and secret alias only."
