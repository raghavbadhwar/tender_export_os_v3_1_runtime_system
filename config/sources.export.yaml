# sources.export.yaml
# Export buyer and RFQ sources
# workflow: EXPORT
# Usage: Radar Agent reads this file to find export RFQ opportunities

sources:

  # --- Indian Export Portals ---

  - name: "India Business Portal (DGFT)"
    url: "https://www.indiabusinessportal.gov.in"
    type: "indian_government"
    workflow: EXPORT
    login_required: false
    paywalled: false
    scrape_type: "web"
    frequency: daily
    notes: "DGFT-backed buyer-seller match. Genuine foreign buyer RFQs."
    health_status: Working

  - name: "Indian Trade Portal (ITP)"
    url: "https://www.indiantradeportal.in"
    type: "indian_government"
    workflow: EXPORT
    login_required: false
    paywalled: false
    scrape_type: "web"
    frequency: daily
    notes: "Market reports, HS codes, tariff data, buyer directories."
    health_status: Working

  - name: "FIEO Connect"
    url: "https://connect.fieo.org"
    type: "epc"
    workflow: EXPORT
    login_required: true
    paywalled: false
    scrape_type: "manual_check"
    frequency: weekly
    notes: "FIEO member RFQs and buyer leads. Registration required."
    health_status: Needs Login

  - name: "APEDA AgriXchange"
    url: "https://agriexchange.apeda.gov.in"
    type: "sector_specific"
    workflow: EXPORT
    login_required: false
    paywalled: false
    scrape_type: "web"
    frequency: weekly
    notes: "Agricultural exports — buyer RFQs, price data, regulations."
    health_status: Working

  - name: "Spices Board India"
    url: "https://www.indianspices.com"
    type: "sector_specific"
    workflow: EXPORT
    login_required: false
    paywalled: false
    scrape_type: "web"
    frequency: weekly
    notes: "Spice export leads and buyer inquiries."
    health_status: Working

  # --- International B2B Platforms ---

  - name: "Alibaba — Buyer RFQs"
    url: "https://rfq.alibaba.com"
    type: "b2b_platform"
    workflow: EXPORT
    login_required: true
    paywalled: false
    scrape_type: "manual_check"
    frequency: daily
    notes: "High volume of buyer RFQs. Verify buyer carefully. Prefer Trade Assurance buyers."
    health_status: Needs Login

  - name: "Global Sources"
    url: "https://www.globalsources.com"
    type: "b2b_platform"
    workflow: EXPORT
    login_required: true
