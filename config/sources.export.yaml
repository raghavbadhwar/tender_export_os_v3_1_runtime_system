  - name: "EC21"
    url: "https://www.ec21.com"
    type: "b2b_platform"
    workflow: EXPORT
    login_required: false
    paywalled: false
    scrape_type: "web"
    frequency: weekly
    notes: "Korean origin, global RFQs. Often from SME importers."
    health_status: Working

  - name: "TradeKey"
    url: "https://www.tradekey.com"
    type: "b2b_platform"
    workflow: EXPORT
    login_required: false
    paywalled: false
