version: 4
board:
  slug: tender-export-os
  name: Tender Export OS
  purpose: "Durable operating board for government tender, export RFQ, supplier sourcing, pricing, compliance, document production, approvals, execution tracking, source health, plugin health, and weekly learning."

statuses:
  - triage
  - todo
  - ready
  - running
  - blocked
  - done
  - archived

profiles:
  - id: hermes-chief-operator
    role: "Overall orchestration, owner briefing, approvals, routing, memory, learning."
  - id: gov-tender-radar
    role: "Find and fast-kill Indian government/public procurement tenders."
  - id: export-rfq-radar
    role: "Find export buyer RFQs and foreign/multilateral procurement opportunities."
  - id: supplier-sourcing
    role: "Apply 5-3-2 supplier sourcing and supplier verification."
  - id: pricing-compliance
    role: "Pricing waterfall, candidate classification notes, tariff/routing, payment risk, and compliance checklist."
  - id: codex-artifact-factory
    role: "Use Codex App-Server Runtime and plugins to create workbooks, PDFs, DOCX, PPTX, dashboards, reports, invoices, and packs."
  - id: sales-followup
    role: "Draft buyer/supplier outreach and follow-up sequences. No external send without approval."
  - id: source-health
    role: "Track broken, paywalled, login-required, low-relevance, high-quality, or restricted sources."
  - id: learning-review
    role: "Weekly review, memory/skill update proposals, and rule improvement."
  - id: chatgpt-boardroom-handoff
    role: "Prepare snapshots and prompts for ChatGPT deep research and strategic review."

task_templates:
  - GOV Tender Intake
  - GOV Deep Read
  - Export RFQ Intake
  - Export Buyer Verification
  - Supplier Sourcing
  - Pricing Proof
  - Compliance Review
  - Artifact Production
  - Approval Required
  - Execution Tracking
  - Weekly Review
  - Source Health Issue
  - Plugin Health Issue
  - ChatGPT Research Request

required_fields:
  - case_id
  - workflow_type
  - source
  - status
  - assignee
  - next_action
  - deadline
  - owner_approval_needed
  - drive_artifact_links
  - comments_or_handoff_notes

safety:
  external_effects_allowed_from_board: false
  approval_card_required_for_gated_actions: true
  receipt_required_after_approved_execution: true
