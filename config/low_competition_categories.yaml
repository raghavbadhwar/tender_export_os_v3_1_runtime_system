categories:
  water_filter_ro_amc:
    label: Water filter / RO AMC / filter replacement
    beginner_friendly_score: 85
    supplier_depth: high
    capital_required: low_medium
    license_required: low
    margin_band: medium
    keywords:
      - ro
      - water purifier
      - filter
      - water cooler
      - membrane
      - drinking water
    recommended_order_types:
      - AMC
      - filter replacement
      - small-rate contract
