# approval_policy.yaml
# Approval Policy — defines what requires owner approval before any action is taken
# Usage: Approval Desk Agent checks this before routing any action card
# Principle: Agents prepare, draft, score, source. Humans approve external/money/legal actions.
# v4.1.2 current contract: supplier outreach, buyer replies, portal credential-heavy
# actions, submissions, payments, DSC, final prices, final classification, and origin
# claims remain approval-gated unless a current owner approval receipt explicitly says otherwise.

# ══════════════════════════════════
# STANDING AUTHORIZATIONS — Owner-Preapproved Operating Actions
# ══════════════════════════════════

standing_authorizations:
  last_updated: "2026-07-01"
  owner_statement: "Archived: earlier broad standing authorization is superseded by the v4.1.2 AGENTS approval-gate summary for this workspace."
  authorized_without_per_case_approval:
    - read_public_listing
    - capture_public_evidence
    - prepare_internal_draft
  credential_handling:
    storage: "macOS Keychain / approved secret store only; never CSV, YAML, Drive, reports, logs, prompts, or event payloads"
    log_format: "secret alias only, never secret value"
    otp_or_captcha: "may pause and request live owner assistance if an OTP, CAPTCHA, phone verification, or human-only identity challenge appears"
  hard_limits_still_requiring_specific_owner_approval:
    - send_supplier_quote_request
    - send_supplier_clarification_request
    - send_supplier_follow_up
    - request_supplier_price_and_availability
    - portal_login_for_research
    - portal_signup_for_research
    - portal_credential_creation
    - portal_session_refresh_for_research
    - send_buyer_rfq_reply
    - send_export_quotation
    - submit_tender_bid
    - upload_tender_documents
    - use_dsc
    - pay_emd_or_bid_security
    - pay_security_deposit
    - pay_advance_to_supplier
    - place_supplier_purchase_order
    - accept_payment_terms
    - commit_final_price
    - commit_delivery_timeline
    - confirm_hsn_itchs_classification
    - claim_country_of_origin
    - purchase_paid_subscription_or_portal_plan
    - make_legal_tax_origin_certification

# ══════════════════════════════════
# MODE A — Autopilot Research + Internal Draft Actions
# ══════════════════════════════════

mode_a_autopilot:
  description: "These actions can run without owner approval"
  allowed_actions:
    - scan_sources
    - extract_fields_from_pdf
    - read_tender_documents
    - score_opportunities
    - create_case_ids
    - fast_kill_scoring
    - deep_read_extraction
    - identify_candidate_suppliers
    - prepare_draft_pricing
    - prepare_draft_compliance_notes
    - prepare_draft_approval_cards
    - generate_daily_brief
    - update_master_cases_internal
    - update_agent_run_log
    - generate_case_reports
    - generate_supplier_shortlist
    - archive_rejected_cases
    - update_source_health
    - generate_pack_builder_draft
    - source_suppliers_research_only
    - generate_plugin_health_notes
    - generate_chatgpt_snapshot
    - generate_drive_sync_manifest
    - create_kanban_tasks_internal
    - produce_internal_artifact_drafts

# ══════════════════════════════════
# MODE B — Approval-Gated Actions (Requires Owner Approval)
# ══════════════════════════════════

mode_b_approval_gated:
  description: "These actions MUST NOT proceed without explicit owner approval"
  gate_enforcement: strict  # Never bypass, even under time pressure

  approval_required_for:

    - action: "send_supplier_quote_request"
      reason: "External supplier message; must be owner-approved and receipt-backed before outreach"
      approval_type: per_case
      card_required: true

    - action: "send_supplier_clarification_request"
      reason: "External supplier message; may create commercial expectations"
      approval_type: per_case
      card_required: true

    - action: "send_supplier_follow_up"
      reason: "External supplier follow-up; may create commercial expectations"
      approval_type: per_case
      card_required: true

    - action: "request_supplier_price_and_availability"
      reason: "External supplier quote request; must not be sent without approval card"
      approval_type: per_case
      card_required: true

    - action: "portal_login_for_research"
      reason: "Credential-heavy portal action; requires owner-controlled credential decision"
      approval_type: per_source
      card_required: true

    - action: "portal_signup_for_research"
      reason: "Creates a portal account or identity trail"
      approval_type: per_source
      card_required: true

    - action: "portal_credential_creation"
      reason: "Creates or uses credentials for an external service"
      approval_type: per_source
      card_required: true

    - action: "portal_session_refresh_for_research"
      reason: "Uses credentialed external session state"
      approval_type: per_source
      card_required: true

    - action: "send_buyer_rfq_reply"
      reason: "External reply to buyer — creates business impression and potential obligation"
      approval_type: per_case
      card_required: true

    - action: "send_export_quotation"
      reason: "Price commitment to foreign buyer — legal and financial obligation"
      approval_type: per_case
      card_required: true

    - action: "submit_tender_bid"
      reason: "Irreversible action; requires DSC; creates binding legal obligation"
      approval_type: per_case
      card_required: true
      dsc_required: true

    - action: "upload_tender_documents"
      reason: "External portal action; may trigger bid acceptance"
      approval_type: per_case
      card_required: true

    - action: "commit_final_price"
      reason: "Price commitment — once sent, difficult to retract"
      approval_type: per_case
      card_required: true

    - action: "commit_delivery_timeline"
      reason: "Delivery promise — missed delivery = penalty"
      approval_type: per_case
      card_required: true

    - action: "accept_payment_terms"
      reason: "Legal and financial commitment"
      approval_type: per_case
      card_required: true

    - action: "confirm_hsn_itchs_classification"
      reason: "Wrong classification = customs penalty; requires export expert review"
      approval_type: per_case
      card_required: true
      expert_review_required: true

    - action: "claim_country_of_origin"
      reason: "Fraudulent origin claim = serious legal liability"
      approval_type: per_case
      card_required: true
      expert_review_required: true

    - action: "pay_emd_or_bid_security"
      reason: "Cash outflow; forfeitable if bid not properly submitted"
      approval_type: per_case
      card_required: true

    - action: "pay_security_deposit"
      reason: "Cash outflow; forfeitable on breach"
      approval_type: per_case
      card_required: true

    - action: "pay_advance_to_supplier"
      reason: "Cash outflow; risk of supplier non-performance"
      approval_type: per_case
      card_required: true

    - action: "place_supplier_purchase_order"
      reason: "Legal commitment to buy; creates payment obligation"
      approval_type: per_case
      card_required: true

    - action: "use_dsc"
      reason: "DSC is a legal signature; use is irreversible"
      approval_type: per_action
      card_required: true

    - action: "send_invoice_externally"
      reason: "External invoice can create payment, tax, and commercial consequences"
      approval_type: per_case
      card_required: true

    - action: "blacklist_supplier_permanently"
      reason: "Permanent supplier blacklist can affect future sourcing and should be owner-reviewed"
      approval_type: per_supplier
      card_required: true

    - action: "patch_pricing_or_compliance_skill"
      reason: "Reusable pricing/compliance rules affect future commercial and legal risk"
      approval_type: per_change
      card_required: true

    - action: "enable_network_or_credential_heavy_plugin"
      reason: "Plugin may access external systems or credentials"
      approval_type: per_plugin
      card_required: true

    - action: "expose_hermes_or_codex_service_publicly"
      reason: "Public service exposure creates security and data leakage risk"
      approval_type: per_action
      card_required: true

# ══════════════════════════════════
# MODE C — Execution Tracker (Post-Approval Actions)
# ══════════════════════════════════

mode_c_execution_tracker:
  description: "After approval, these tracking actions run automatically"
  allowed_actions:
    - track_supplier_response
    - track_bid_submission_status
    - track_buyer_follow_up
    - track_quote_validity_window
    - track_delivery_deadline
    - track_payment_status
    - record_receipt
    - update_case_status
    - send_internal_reminder
    - update_kanban_internal_status
    - sync_approved_artifacts_to_drive

  escalation_triggers:
    - "Supplier no response in 48 hours → flag in brief"
    - "Quote validity expiring in 24 hours → alert owner"
    - "Delivery deadline within 7 days → daily alert"
    - "Payment overdue by 3 days → escalate to owner"

# ══════════════════════════════════
# v4.1.2 Approval Timeout And Lifecycle Contract
# ══════════════════════════════════

approval_timeout_policy:
  default_timeout_hours: 48
  on_timeout_status: "CHANGES_REQUESTED"
  owner_brief_label: "Approval stale; ask changes or reissue card"
  rule: "Never infer approval from silence. Expired approval cards cannot unlock external execution."

execution_lifecycle:
  approved_case_entry_sub_status: "AWAITING_EXECUTION"
  terminal_sub_statuses:
    - "COMPLETED"
    - "FAILED"
    - "LOST"
  rule: "Execution Tracker records follow-up state only inside the approved action scope and must not re-send, re-submit, pay, upload, or escalate without a fresh owner command."

# ══════════════════════════════════
# APPROVAL CARD REQUIREMENTS
# ══════════════════════════════════

approval_card:
  required_fields:
    - case_id
    - workflow_type          # GOV or EXPORT
    - proposed_action
    - business_object        # What will happen externally
    - amount_or_price        # If applicable
    - expected_benefit
    - concrete_risk
    - recovery_rollback_path
    - documents_sources_used
    - confidence_score       # 0-100
    - missing_information    # Explicit list of unknowns
    - approval_options       # [Approve, Reject, Ask Changes]

  output_format: HTML
  output_path: "receipts/approvals/{case_id}_approval_card.html"
  notify_hermes: true

# ══════════════════════════════════
# RECEIPT REQUIREMENTS
# ══════════════════════════════════

receipt:
  required_fields:
    - receipt_id
    - case_id
    - action
    - actor                  # Which agent or human performed action
    - timestamp
    - approval_reference     # Links to approval card
    - input_summary
    - output_summary
    - evidence_or_proof
    - external_effect        # What changed in the outside world
    - next_action
    - verification_status

  output_path: "receipts/{type}/{receipt_id}.json"
  types: [approvals, submissions, supplier_quotes, owner_decisions]
