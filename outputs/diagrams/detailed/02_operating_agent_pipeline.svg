<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
  .bg { fill: #050607; }
  .title { fill: #f4f6f1; font: 800 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .subtitle { fill: #c4c9c2; font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .section { fill: #eff5ed; font: 800 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .h1 { fill: #f2f8ef; font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .body { fill: #c7d6c8; font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .small { fill: #b9c2b8; font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .tiny { fill: #a8aea6; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .card { stroke-width: 2.1; rx: 16; ry: 16; filter: url(#shadow); }
  .mini { stroke-width: 1.7; rx: 11; ry: 11; filter: url(#shadow); }
  .hermes { fill: #0a5a49; stroke: #31d0a3; }
  .agent { fill: #0a4d40; stroke: #28bd96; }
  .ledger { fill: #4d390d; stroke: #e0ad34; }
  .projection { fill: #464844; stroke: #aeb0a6; }
  .codex { fill: #0a4d68; stroke: #42c8f0; }
  .chatgpt { fill: #443692; stroke: #8e82ff; }
  .drive { fill: #3f4542; stroke: #b9bbb2; }
  .owner { fill: #6e4309; stroke: #f1a22c; }
  .approval { fill: #5c1f28; stroke: #f16e7f; }
  .source { fill: #233b45; stroke: #69b8d0; }
  .validate { fill: #28324f; stroke: #7c9cf6; }
  .line { fill: none; stroke-width: 3; marker-end: url(#arrow); }
  .thin { stroke-width: 2; }
  .dash { stroke-dasharray: 10 8; }
</style>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d2d8cf"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1200"/>
  <text class="title" x="900" y="58" text-anchor="middle">Detail 02 - Operating Agent Pipeline</text>
  <text class="subtitle" x="900" y="94" text-anchor="middle">The actual 11-agent roster and the state-machine contract each agent must obey.</text>
  <rect class="mini agent" x="90" y="170" width="245" height="145"/>
<text class="h1" x="212" y="204" text-anchor="middle">1 Radar</text>
<text class="small" x="212" y="232" text-anchor="middle">Find GOV and EXPORT leads</text>
<text class="small" x="212" y="253" text-anchor="middle">Assign case IDs</text>
<text class="small" x="212" y="274" text-anchor="middle">Update source health</text>
<rect class="mini agent" x="395" y="170" width="245" height="145"/>
<text class="h1" x="517" y="204" text-anchor="middle">2 Fast Kill</text>
<text class="small" x="517" y="232" text-anchor="middle">Apply kill rules</text>
<text class="small" x="517" y="253" text-anchor="middle">Score 0-100</text>
<text class="small" x="517" y="274" text-anchor="middle">Reject or watchlist</text>
<rect class="mini agent" x="700" y="170" width="245" height="145"/>
<text class="h1" x="822" y="204" text-anchor="middle">3 Deep Read</text>
<text class="small" x="822" y="232" text-anchor="middle">Extract PDF/BOQ/RFQ fields</text>
<text class="small" x="822" y="253" text-anchor="middle">Eligibility, terms, deadlines</text>
<text class="small" x="822" y="274" text-anchor="middle">Unreadable docs become blockers</text>
<rect class="mini agent" x="1005" y="170" width="245" height="145"/>
<text class="h1" x="1127" y="204" text-anchor="middle">4 Supplier Engine</text>
<text class="small" x="1127" y="232" text-anchor="middle">5 candidate suppliers</text>
<text class="small" x="1127" y="253" text-anchor="middle">3 source types</text>
<text class="small" x="1127" y="274" text-anchor="middle">2 quote proofs before pricing</text>
<rect class="mini agent" x="1310" y="170" width="245" height="145"/>
<text class="h1" x="1432" y="204" text-anchor="middle">5 Pricing</text>
<text class="small" x="1432" y="232" text-anchor="middle">Cost waterfall</text>
<text class="small" x="1432" y="253" text-anchor="middle">Draft bid/quote price</text>
<text class="small" x="1432" y="274" text-anchor="middle">No final commitment</text>
<rect class="mini agent" x="90" y="430" width="245" height="145"/>
<text class="h1" x="212" y="464" text-anchor="middle">6 Compliance</text>
<text class="small" x="212" y="492" text-anchor="middle">Draft HSN/ITC-HS only</text>
<text class="small" x="212" y="513" text-anchor="middle">DGFT/SCOMET flags</text>
<text class="small" x="212" y="534" text-anchor="middle">Origin never final</text>
<rect class="mini agent" x="395" y="430" width="245" height="145"/>
<text class="h1" x="517" y="464" text-anchor="middle">7 Pack Builder</text>
<text class="small" x="517" y="492" text-anchor="middle">Bid packs</text>
<text class="small" x="517" y="513" text-anchor="middle">Export quote packs</text>
<text class="small" x="517" y="534" text-anchor="middle">Risk and missing items</text>
<rect class="mini approval" x="700" y="430" width="245" height="145"/>
<text class="h1" x="822" y="464" text-anchor="middle">8 Approval Desk</text>
<text class="small" x="822" y="492" text-anchor="middle">Decision card</text>
<text class="small" x="822" y="513" text-anchor="middle">Benefit, risk, recovery</text>
<text class="small" x="822" y="534" text-anchor="middle">Approve / Reject / Ask</text>
<rect class="mini agent" x="1005" y="430" width="245" height="145"/>
<text class="h1" x="1127" y="464" text-anchor="middle">9 Execution Tracker</text>
<text class="small" x="1127" y="492" text-anchor="middle">Post-approval tracking</text>
<text class="small" x="1127" y="513" text-anchor="middle">Receipts</text>
<text class="small" x="1127" y="534" text-anchor="middle">No resend without command</text>
<rect class="mini agent" x="1310" y="430" width="245" height="145"/>
<text class="h1" x="1432" y="464" text-anchor="middle">10 Owner Briefing</text>
<text class="small" x="1432" y="492" text-anchor="middle">Daily concise brief</text>
<text class="small" x="1432" y="513" text-anchor="middle">Top approvals and blockers</text>
<text class="small" x="1432" y="534" text-anchor="middle">One smallest useful action</text>
<rect class="mini codex" x="505" y="700" width="330" height="145"/>
<text class="h1" x="670" y="734" text-anchor="middle">11 Codex Plugin Factory</text>
<text class="small" x="670" y="762" text-anchor="middle">Artifacts and parser tooling</text>
<text class="small" x="670" y="783" text-anchor="middle">Plugin receipts</text>
<text class="small" x="670" y="804" text-anchor="middle">No external sends</text>
<path class="line" stroke="#28bd96" d="M335 242 L395 242"/>
<path class="line" stroke="#28bd96" d="M640 242 L700 242"/>
<path class="line" stroke="#28bd96" d="M945 242 L1005 242"/>
<path class="line" stroke="#28bd96" d="M1250 242 L1310 242"/>
<path class="line" stroke="#28bd96" d="M1432 315 L1432 382"/>
<path class="line" stroke="#28bd96" d="M1432 382 L212 382"/>
<path class="line" stroke="#28bd96" d="M212 382 L212 430"/>
<path class="line" stroke="#28bd96" d="M335 502 L395 502"/>
<path class="line" stroke="#f16e7f" d="M640 502 L700 502"/>
<path class="line" stroke="#f16e7f" d="M945 502 L1005 502"/>
<path class="line" stroke="#28bd96" d="M1250 502 L1310 502"/>
<path class="line dash" stroke="#42c8f0" d="M832 575 L832 700"/>
<rect class="card projection" x="75" y="880" width="500" height="185"/>
<text class="h1" x="325" y="920" text-anchor="middle">Shared Agent Contract</text>
<text class="body" x="325" y="956" text-anchor="middle">Read/write by case_id</text>
<text class="body" x="325" y="982" text-anchor="middle">Append data/agent_run_log.csv after each run</text>
<text class="body" x="325" y="1008" text-anchor="middle">Cite source files and links</text>
<text class="body" x="325" y="1034" text-anchor="middle">Stop at configured approval gates</text>
<rect class="card validate" x="650" y="880" width="480" height="185"/>
<text class="h1" x="890" y="920" text-anchor="middle">Status Contract</text>
<text class="body" x="890" y="956" text-anchor="middle">NEW -&gt; FAST_KILL -&gt; WATCHLIST / REJECTED</text>
<text class="body" x="890" y="982" text-anchor="middle">DEEP_READ -&gt; SUPPLIER_SEARCH -&gt; PRICING_READY</text>
<text class="body" x="890" y="1008" text-anchor="middle">ARTIFACT_PRODUCTION -&gt; APPROVAL_REQUIRED</text>
<text class="body" x="890" y="1034" text-anchor="middle">APPROVED -&gt; SENT_OR_SUBMITTED -&gt; FOLLOW_UP</text>
<rect class="card approval" x="1205" y="880" width="520" height="185"/>
<text class="h1" x="1465" y="920" text-anchor="middle">Forbidden Across Agents</text>
<text class="body" x="1465" y="956" text-anchor="middle">No fabricated documents, buyer verification, supplier claims</text>
<text class="body" x="1465" y="982" text-anchor="middle">No final HSN/ITC-HS, origin, price, or delivery claim</text>
<text class="body" x="1465" y="1008" text-anchor="middle">No DSC, payment, bid upload, buyer quote without approval</text>
<rect class="mini projection" x="70" y="1110" width="1660" height="58"/>
<text class="tiny" x="900" y="1134" text-anchor="middle">Current live registers: 13 cases, 671 events, 3 approvals, 14 suppliers, 5 quotes, 6 RFQs, 6 buyers. Safe health check: 16/16 passed.</text>
<text class="tiny" x="900" y="1158" text-anchor="middle">Generated from Tender Export OS v4.1 repo state: manifest.json, AGENTS.md, HERMES.md, config/*, data/*, scripts/*.</text>
</svg>
