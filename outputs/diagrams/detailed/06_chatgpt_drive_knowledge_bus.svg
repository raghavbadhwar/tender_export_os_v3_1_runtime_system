<text class="h1" x="320" y="890" text-anchor="middle">Never Send to Drive/ChatGPT</text>
<text class="body" x="320" y="926" text-anchor="middle">credentials, cookies, DSC files, bank details</text>
<text class="body" x="320" y="952" text-anchor="middle">raw operational databases unless explicitly bounded</text>
<text class="body" x="320" y="978" text-anchor="middle">unreviewed private supplier claims as final facts</text>
