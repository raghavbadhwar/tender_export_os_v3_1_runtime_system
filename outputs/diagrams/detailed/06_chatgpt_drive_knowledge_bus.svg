<text class="body" x="900" y="926" text-anchor="middle">data/events.jsonl remains canonical</text>
<text class="body" x="900" y="952" text-anchor="middle">Drive stores packets, artifacts, receipts, snapshots</text>
<text class="body" x="900" y="978" text-anchor="middle">ChatGPT must not overwrite registers</text>
