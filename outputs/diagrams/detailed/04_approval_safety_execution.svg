<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <style>
  .bg { fill: #050607; }
  .title { fill: #f4f6f1; font: 800 40px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .subtitle { fill: #c4c9c2; font: 600 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .section { fill: #eff5ed; font: 800 27px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .h1 { fill: #f2f8ef; font: 800 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .body { fill: #c7d6c8; font: 600 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .small { fill: #b9c2b8; font: 600 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .tiny { fill: #a8aea6; font: 600 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .card { stroke-width: 2.1; rx: 16; ry: 16; filter: url(#shadow); }
  .mini { stroke-width: 1.7; rx: 11; ry: 11; filter: url(#shadow); }
  .hermes { fill: #0a5a49; stroke: #31d0a3; }
  .agent { fill: #0a4d40; stroke: #28bd96; }
  .ledger { fill: #4d390d; stroke: #e0ad34; }
  .projection { fill: #464844; stroke: #aeb0a6; }
  .codex { fill: #0a4d68; stroke: #42c8f0; }
  .chatgpt { fill: #443692; stroke: #8e82ff; }
  .drive { fill: #3f4542; stroke: #b9bbb2; }
  .owner { fill: #6e4309; stroke: #f1a22c; }
  .approval { fill: #5c1f28; stroke: #f16e7f; }
  .source { fill: #233b45; stroke: #69b8d0; }
  .validate { fill: #28324f; stroke: #7c9cf6; }
  .line { fill: none; stroke-width: 3; marker-end: url(#arrow); }
  .thin { stroke-width: 2; }
  .dash { stroke-dasharray: 10 8; }
</style>
    <filter id="shadow" x="-8%" y="-8%" width="116%" height="125%">
      <feDropShadow dx="0" dy="6" stdDeviation="7" flood-color="#000" flood-opacity="0.36"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d2d8cf"/>
    </marker>
  </defs>
  <rect class="bg" width="1800" height="1200"/>
  <text class="title" x="900" y="58" text-anchor="middle">Detail 04 - Approval, Safety, and Execution Boundaries</text>
  <text class="subtitle" x="900" y="94" text-anchor="middle">The current approval policy and safety model, including standing authorizations and hard gates.</text>
  <rect class="card agent" x="70" y="150" width="470" height="215"/>
<text class="h1" x="305" y="190" text-anchor="middle">Mode A - Allowed Internal Work</text>
<text class="body" x="305" y="226" text-anchor="middle">scan sources, extract fields, score opportunities</text>
<text class="body" x="305" y="252" text-anchor="middle">create case IDs, fast-kill, deep-read</text>
<text class="body" x="305" y="278" text-anchor="middle">draft pricing/compliance, case reports, briefs</text>
<text class="body" x="305" y="304" text-anchor="middle">standing-authorized supplier outreach with receipts</text>
<rect class="card approval" x="665" y="150" width="470" height="215"/>
<text class="h1" x="900" y="190" text-anchor="middle">Mode B - Per-Case Approval Gates</text>
<text class="body" x="900" y="226" text-anchor="middle">buyer RFQ reply, export quotation, tender bid</text>
<text class="body" x="900" y="252" text-anchor="middle">document upload, DSC use, payments</text>
<text class="body" x="900" y="278" text-anchor="middle">final price, HSN/ITC-HS, origin, delivery</text>
<text class="body" x="900" y="304" text-anchor="middle">purchase order or payment-term acceptance</text>
<rect class="card hermes" x="1260" y="150" width="470" height="215"/>
<text class="h1" x="1495" y="190" text-anchor="middle">Mode C - Execution Tracking</text>
<text class="body" x="1495" y="226" text-anchor="middle">track supplier/buyer replies after approval</text>
<text class="body" x="1495" y="252" text-anchor="middle">track quote validity and deadlines</text>
<text class="body" x="1495" y="278" text-anchor="middle">record receipts and case status</text>
<text class="body" x="1495" y="304" text-anchor="middle">internal reminders only</text>
<path class="line" stroke="#f16e7f" d="M540 258 L665 258"/>
<path class="line" stroke="#f16e7f" d="M1135 258 L1260 258"/>
<rect class="card projection" x="90" y="485" width="440" height="235"/>
<text class="h1" x="310" y="525" text-anchor="middle">Approval Card Required Fields</text>
<text class="body" x="310" y="561" text-anchor="middle">case_id, workflow, proposed action</text>
<text class="body" x="310" y="587" text-anchor="middle">business object and amount</text>
<text class="body" x="310" y="613" text-anchor="middle">benefit, concrete risk, recovery path</text>
<text class="body" x="310" y="639" text-anchor="middle">sources, confidence, missing info, options</text>
<rect class="card owner" x="680" y="485" width="440" height="235"/>
<text class="h1" x="900" y="525" text-anchor="middle">Standing Authorization Limits</text>
<text class="body" x="900" y="561" text-anchor="middle">supplier quote/availability requests allowed</text>
<text class="body" x="900" y="587" text-anchor="middle">portal login/signup for research allowed</text>
<text class="body" x="900" y="613" text-anchor="middle">secrets only in Keychain/approved store</text>
<text class="body" x="900" y="639" text-anchor="middle">OTP/CAPTCHA pauses for owner help</text>
<rect class="card approval" x="1270" y="485" width="440" height="235"/>
<text class="h1" x="1490" y="525" text-anchor="middle">Hard Stop Conditions</text>
<text class="body" x="1490" y="561" text-anchor="middle">required evidence missing</text>
<text class="body" x="1490" y="587" text-anchor="middle">SCOMET/prohibited suspicion</text>
<text class="body" x="1490" y="613" text-anchor="middle">Codex/plugin/auth unavailable</text>
<text class="body" x="1490" y="639" text-anchor="middle">Drive connector unavailable for sync</text>
<rect class="card projection" x="90" y="835" width="440" height="190"/>
<text class="h1" x="310" y="875" text-anchor="middle">Receipts</text>
<text class="body" x="310" y="911" text-anchor="middle">receipts/approvals</text>
<text class="body" x="310" y="937" text-anchor="middle">receipts/supplier_quotes</text>
<text class="body" x="310" y="963" text-anchor="middle">receipts/submissions</text>
<text class="body" x="310" y="989" text-anchor="middle">receipts/owner_decisions</text>
<rect class="card validate" x="680" y="835" width="440" height="190"/>
<text class="h1" x="900" y="875" text-anchor="middle">Memory Discipline</text>
<text class="body" x="900" y="911" text-anchor="middle">memory writes require approval</text>
<text class="body" x="900" y="937" text-anchor="middle">raw tenders/RFQs and supplier tables excluded</text>
<text class="body" x="900" y="963" text-anchor="middle">credentials, DSC, bank details never saved</text>
<rect class="card ledger" x="1270" y="835" width="440" height="190"/>
<text class="h1" x="1490" y="875" text-anchor="middle">Audit Trail</text>
<text class="body" x="1490" y="911" text-anchor="middle">data/events.jsonl</text>
<text class="body" x="1490" y="937" text-anchor="middle">data/agent_run_log.csv</text>
<text class="body" x="1490" y="963" text-anchor="middle">source citations in every output</text>
<text class="body" x="1490" y="989" text-anchor="middle">approval status remains explicit</text>
<rect class="mini projection" x="70" y="1110" width="1660" height="58"/>
<text class="tiny" x="900" y="1134" text-anchor="middle">Current live registers: 13 cases, 671 events, 3 approvals, 14 suppliers, 5 quotes, 6 RFQs, 6 buyers. Safe health check: 16/16 passed.</text>
<text class="tiny" x="900" y="1158" text-anchor="middle">Generated from Tender Export OS v4.1 repo state: manifest.json, AGENTS.md, HERMES.md, config/*, data/*, scripts/*.</text>
</svg>
