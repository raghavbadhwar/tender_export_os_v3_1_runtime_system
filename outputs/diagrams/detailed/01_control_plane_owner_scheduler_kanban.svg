<rect class="mini approval" x="955" y="680" width="355" height="155"/>
<text class="h1" x="1132" y="714" text-anchor="middle">Control-Plane Guardrails</text>
<text class="small" x="1132" y="742" text-anchor="middle">No public service exposure</text>
